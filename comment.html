<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Comment Section</title>

<style>

body{
background:#0d1117;
font-family:Arial;
color:white;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

h2{
text-align:center;
}

.comment-form{
background:#161b22;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#0d1117;
color:white;
}

button{
margin-top:10px;
padding:10px 20px;
background:#238636;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2ea043;
}

.comment-box{
background:#161b22;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.name{
color:#58a6ff;
font-weight:bold;
}

.time{
font-size:12px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h2>💬 Comments</h2>

<div class="comment-form">

<input type="text" id="name" placeholder="Your Name">

<textarea id="comment" rows="4" placeholder="Write your comment..."></textarea>

<button onclick="addComment()">Post Comment</button>

</div>

<div id="comments"></div>

</div>

<script>

let comments = JSON.parse(localStorage.getItem("comments")) || [];

function showComments(){

let output = "";

comments.forEach(function(c){

output += `
<div class="comment-box">
<div class="name">${c.name}</div>
<div class="time">${c.time}</div>
<p>${c.comment}</p>
</div>
`;

});

document.getElementById("comments").innerHTML = output;

}

function addComment(){

let name = document.getElementById("name").value;
let comment = document.getElementById("comment").value;

if(name === "" || comment === ""){
alert("Please fill all fields");
return;
}

let time = new Date().toLocaleString();

comments.unshift({
name:name,
comment:comment,
time:time
});

localStorage.setItem("comments", JSON.stringify(comments));

document.getElementById("name").value="";
document.getElementById("comment").value="";

showComments();

}

showComments();

</script>

</body>
</html>
